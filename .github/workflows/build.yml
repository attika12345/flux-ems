name: Build EMS for all platforms

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install pyserial requests geopy tzlocal pytz cryptography numpy pandas pyyaml

      - name: Build Windows EXE
        run: pyinstaller --onefile --windowed --name EMS --collect-all serial --collect-all requests --collect-all geopy --collect-all tzlocal --collect-all pytz --collect-all cryptography --collect-all numpy --collect-all pandas ems_full_geo.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: EMS-windows
          path: dist/EMS.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install pyserial requests geopy tzlocal pytz cryptography numpy pandas pyyaml

      - name: Build Linux binary
        run: |
          pyinstaller --onefile --name EMS \
            --collect-all serial \
            --collect-all requests \
            --collect-all geopy \
            --collect-all tzlocal \
            --collect-all pytz \
            --collect-all cryptography \
            --collect-all numpy \
            --collect-all pandas \
            ems_full_geo.py

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: EMS-linux
          path: dist/EMS

  build-raspberry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Enable ARM cross-compile
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support

      - name: Run ARM container and build
        run: |
          docker run --rm -v ${{ github.workspace }}:/src --platform linux/arm/v7 python:3.11 bash -c "
            pip install pyinstaller &&
            pip install pyserial requests geopy tzlocal pytz cryptography numpy pandas pyyaml &&
            cd /src &&
            pyinstaller --onefile --name EMS-pi \
              --collect-all serial \
              --collect-all requests \
              --collect-all geopy \
              --collect-all tzlocal \
              --collect-all pytz \
              --collect-all cryptography \
              --collect-all numpy \
              --collect-all pandas \
              ems_full_geo.py
          "

      - name: Upload Raspberry Pi artifact
        uses: actions/upload-artifact@v4
        with:
          name: EMS-pi
          path: dist/EMS-pi

  release:
    needs: [build-windows, build-linux, build-raspberry]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/EMS-windows/EMS.exe
            artifacts/EMS-linux/EMS
            artifacts/EMS-pi/EMS-pi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
