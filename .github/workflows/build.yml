name: Build EMS for all platforms

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Build Windows EXE
        run: pyinstaller --onefile --windowed --name EMS ems_full_geo.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v3
        with:
          name: EMS-windows
          path: dist/EMS.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Build Linux binary
        run: pyinstaller --onefile --name EMS ems_full_geo.py

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v3
        with:
          name: EMS-linux
          path: dist/EMS

  build-raspberry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Enable ARM cross-compile
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support

      - name: Run ARM container and build
        run: |
          docker run --rm -v ${{ github.workspace }}:/src --platform linux/arm/v7 python:3.11 bash -c "
            pip install pyinstaller &&
            cd /src &&
            pyinstaller --onefile --name EMS-pi ems_full_geo.py
          "

      - name: Upload Raspberry Pi artifact
        uses: actions/upload-artifact@v3
        with:
          name: EMS-pi
          path: dist/EMS-pi

  release:
    needs: [build-windows, build-linux, build-raspberry]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/EMS-windows/EMS.exe
            artifacts/EMS-linux/EMS
            artifacts/EMS-pi/EMS-pi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
