name: Build EMS Linux + Raspberry
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          pip install pyinstaller pyserial requests geopy tzlocal pytz cryptography numpy pandas pyyaml
      
      - name: Build Linux binary
        run: |
          pyinstaller --onefile --name EMS \
            --collect-all serial \
            --collect-all requests \
            --collect-all geopy \
            --collect-all tzlocal \
            --collect-all pytz \
            --collect-all cryptography \
            --collect-all numpy \
            --collect-all pandas \
            --collect-all yaml \
            ems_full_geo.py
      
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: EMS-linux
          path: dist/EMS

  build-raspberry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Python for ARM
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip python3-venv
      
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pyinstaller pyserial requests geopy tzlocal pytz cryptography numpy pandas pyyaml
      
      - name: Build Raspberry Pi binary
        run: |
          python3 -m pyinstaller --onefile --name EMS-pi \
            --collect-all serial \
            --collect-all requests \
            --collect-all geopy \
            --collect-all tzlocal \
            --collect-all pytz \
            --collect-all cryptography \
            --collect-all numpy \
            --collect-all pandas \
            --collect-all yaml \
            ems_full_geo.py
      
      - name: Upload Raspberry Pi artifact
        uses: actions/upload-artifact@v4
        with:
          name: EMS-pi
          path: dist/EMS-pi

  attach-to-release:
    needs: [build-linux, build-raspberry]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
      
      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/EMS-linux/EMS
            artifacts/EMS-pi/EMS-pi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
