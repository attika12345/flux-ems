name: FluxEmsPro Linux Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libs
        run: |
          pip install nuitka flask requests pyserial pytz cryptography
          # Ha van requirements.txt, akkor: pip install -r requirements.txt

      - name: Nuitka Build
        run: |
          python -m nuitka \
            --standalone \
            --onefile \
            --include-package=flask \
            --include-package=cryptography \
            --include-package=pyserial \
            --output-filename=FluxEmsPro.bin \
            --output-dir=dist \
            main.py

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: FluxEmsPro-Linux
          path: dist/FluxEmsPro.bin
