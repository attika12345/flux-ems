name: Build EMS Linux + Raspberry

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      
      - name: Install PyInstaller and deps
        run: python3 -m pip install pyinstaller pyserial requests geopy tzlocal pytz cryptography numpy pandas pyyaml
      
      - name: Build Linux
        run: python3 -m pyinstaller --onefile --name EMS --collect-all serial --collect-all requests --collect-all geopy --collect-all tzlocal --collect-all pytz --collect-all cryptography --collect-all numpy --collect-all pandas --collect-all yaml ems_full_geo.py
      
      - uses: actions/upload-artifact@v4
        with:
          name: EMS-linux
          path: dist/EMS

  build-raspberry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      
      - name: Install PyInstaller and deps
        run: python3 -m pip install pyinstaller pyserial requests geopy tzlocal pytz cryptography numpy pandas pyyaml
      
      - name: Build Raspberry
        run: python3 -m pyinstaller --onefile --name EMS-pi --collect-all serial --collect-all requests --collect-all geopy --collect-all tzlocal --collect-all pytz --collect-all cryptography --collect-all numpy --collect-all pandas --collect-all yaml ems_full_geo.py
      
      - uses: actions/upload-artifact@v4
        with:
          name: EMS-pi
          path: dist/EMS-pi

  release:
    needs: [build-linux, build-raspberry]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/EMS-linux/EMS
            artifacts/EMS-pi/EMS-pi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
