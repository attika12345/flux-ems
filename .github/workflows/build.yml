name: FluxEmsPro Pi Build (Stable)
on: [push, workflow_dispatch]

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build ARM64 Binary
        uses: pguyot/arm-runner-action@v2
        with:
          base_image: raspios_lite_arm64:latest
          cpu: cortex-a72
          commands: |
            apt-get update && apt-get install -y python3-pip build-essential libssl-dev patchelf
            pip3 install nuitka flask requests pyserial pytz cryptography
            python3 -m nuitka --standalone --onefile --jobs=1 --output-filename=FluxEmsPro_ARM64.bin ems_full_geo.py
      - uses: actions/upload-artifact@v4
        with:
          name: FluxEmsPro-Pi
          path: FluxEmsPro_ARM64.bin
