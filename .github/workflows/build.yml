name: Build EMS Linux + Raspberry for v1.0

on:
  workflow_dispatch:

jobs:

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install --only-binary=:all: cryptography numpy pandas
          python3 -m pip install pyinstaller pyserial requests geopy tzlocal pytz pyyaml

      - name: Build Linux binary
        run: |
          python3 -m pyinstaller --onefile --name EMS \
            --collect-all serial \
            --collect-all requests \
            --collect-all geopy \
            --collect-all tzlocal \
            --collect-all pytz \
            --collect-all cryptography \
            --collect-all numpy \
            --collect-all pandas \
            --collect-all yaml \
            ems_full_geo.py

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: EMS-linux
          path: dist/EMS


  build-raspberry:
    runs-on: ubuntu-22.04-arm64
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install --only-binary=:all: cryptography numpy pandas
          python3 -m pip install pyinstaller pyserial requests geopy tzlocal pytz pyyaml

      - name: Build Raspberry Pi binary
        run: |
          python3 -m pyinstaller --onefile --name EMS-pi \
            --collect-all serial \
            --collect-all requests \
            --collect-all geopy \
            --collect-all tzlocal \
            --collect-all pytz \
            --collect-all cryptography \
            --collect-all numpy \
            --collect-all pandas \
            --collect-all yaml \
            ems_full_geo.py

      - name: Upload Raspberry Pi artifact
        uses: actions/upload-artifact@v4
        with:
          name: EMS-pi
          path: dist/EMS-pi


  attach-to-release:
    needs: [build-linux, build-raspberry]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Upload to release v1.0
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v1.0"
          files: |
            artifacts/EMS-linux/EMS
            artifacts/EMS-pi/EMS-pi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
