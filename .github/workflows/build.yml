name: Build EMS Linux + Raspberry (append to existing release)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag (pl. manual-1)"
        required: true
  push:
    tags:
      - "v*"

jobs:

  build-linux:
    runs-on: ubuntu-latest
    outputs:
      linux_path: ${{ steps.upload.outputs.artifact_path }}
    steps:
      - uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install pyserial requests geopy tzlocal pytz cryptography numpy pandas pyyaml

      - name: Build Linux binary
        run: |
          pyinstaller --onefile --name EMS \
            --collect-all serial \
            --collect-all requests \
            --collect-all geopy \
            --collect-all tzlocal \
            --collect-all pytz \
            --collect-all cryptography \
            --collect-all numpy \
            --collect-all pandas \
            --collect-all yaml \
            ems_full_geo.py

      - name: Upload Linux artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: EMS-linux
          path: dist/EMS


  build-raspberry:
    runs-on: ubuntu-latest
    outputs:
      pi_path: ${{ steps.upload.outputs.artifact_path }}
    steps:
      - uses: actions/checkout@v3

      - name: Enable ARM cross-compile
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support

      - name: Run ARM container and build
        run: |
          docker run --rm -v ${{ github.workspace }}:/src --platform linux/arm/v7 python:3.11 bash -c "
            pip install pyinstaller &&
            pip install pyserial requests geopy tzlocal pytz cryptography numpy pandas pyyaml &&
            cd /src &&
            pyinstaller --onefile --name EMS-pi \
              --collect-all serial \
              --collect-all requests \
              --collect-all geopy \
              --collect-all tzlocal \
              --collect-all pytz \
              --collect-all cryptography \
              --collect-all numpy \
              --collect-all pandas \
              --collect-all yaml \
              ems_full_geo.py
          "

      - name: Upload Raspberry Pi artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: EMS-pi
          path: dist/EMS-pi


  attach-to-release:
    needs: [build-linux, build-raspberry]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Upload to existing release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: |
            artifacts/EMS-linux/EMS
            artifacts/EMS-pi/EMS-pi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
