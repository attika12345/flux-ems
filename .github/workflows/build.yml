name: FluxEmsPro Linux Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev libssl-dev
          pip install nuitka flask requests pyserial pytz cryptography

      - name: Build with Nuitka
        run: |
          python -m nuitka \
            --standalone \
            --onefile \
            --include-package=flask \
            --include-package=cryptography \
            --include-package=serial \
            --include-package=requests \
            --include-package=pytz \
            --output-filename=FluxEmsPro.bin \
            --output-dir=dist \
            ems_full_geo.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FluxEmsPro-Linux-Binary
          path: dist/FluxEmsPro.bin
