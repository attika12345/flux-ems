name: Build EMS Linux

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - run: python3 -m pip install --upgrade pip setuptools wheel

      - run: python3 -m pip install pyinstaller pyserial requests geopy tzlocal pytz cryptography numpy pandas pyyaml

      - run: |
          python3 -m pyinstaller --onefile --name EMS \
            --collect-all serial \
            --collect-all requests \
            --collect-all geopy \
            --collect-all tzlocal \
            --collect-all pytz \
            --collect-all cryptography \
            --collect-all numpy \
            --collect-all pandas \
            --collect-all yaml \
            ems_full_geo.py

      - uses: actions/upload-artifact@v4
        with:
          name: EMS-linux
          path: dist/EMS
